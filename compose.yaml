services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deal}
      POSTGRES_USER: ${POSTGRES_USER:-deal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.local before starting PostgreSQL}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - deal-postgres-data:/var/lib/postgresql

volumes:
  deal-postgres-data:
